specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  # --- ETHEREUM SEPOLIA SOURCE ---
  - kind: ethereum
    name: BioVerifyV3_Eth
    network: sepolia
    source:
      address: "0x9848c686AC2b1b0309118aDFDbb25417E601f2AD"
      abi: BioVerifyV3
      startBlock: 10361711
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Publication
        - Member
      abis:
        - name: BioVerifyV3
          file: ./abis/BioVerifyV3.json
      eventHandlers:
        - event: SubmitPublication(indexed address,indexed uint256,string)
          handler: handleSubmitPublication
        - event: NewPublicationStatus(indexed uint256,uint8)
          handler: handleNewPublicationStatus
        - event: LockedStakeOnPubId(indexed uint256,uint256)
          handler: handleLockedStakeOnPubId
        - event: Agent_PickReviewers(indexed uint256,indexed address,address[],address,string)
          handler: handleAgentPickReviewers
        - event: Agent_FinalizePublication(indexed uint256,string,uint8)
          handler: handleAgentFinalizePublication
        - event: MemberReputation(indexed address,uint256)
          handler: handleMemberReputation
        - event: MemberAvailableStake(indexed address,uint256)
          handler: handleMemberAvailableStake
        - event: MemberLockedStake(indexed address,uint256)
          handler: handleMemberLockedStake
        - event: IsAvailableReviewer(indexed address,bool,uint256)
          handler: handleIsAvailableReviewer
      file: ./src/bio-verify-v-3.ts