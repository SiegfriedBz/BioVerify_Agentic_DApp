type Publication @entity(immutable: false) {
  id: ID! # network-pubId
  pubId: BigInt!
  network: String!
  publisher: Bytes!
  reviewers: [Bytes!]
  seniorReviewer: Bytes
  cid: String!
  verdictCid: String
  lockedStake: BigInt!
  status: Int! # Enum: 0=SUBMITTED, 1=EARLY_SLASHED, 2=IN_REVIEW, 3=SLASHED, 4=PUBLISHED
  createdAt: BigInt!
  updatedAt: BigInt!
}

type Member @entity(immutable: false) {
  id: ID! # Wallet Address
  availableStake: BigInt!
  lockedStake: BigInt!
  reputation: BigInt!
  isAvailable: Boolean!
  totalReviews: BigInt!
}