specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: BioVerifyV3
    network: base-sepolia
    source:
      address: "0xa81cDEc6794110ccD76773378D7e6e8B981e7824"
      abi: BioVerifyV3
      startBlock: 38300394
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Agent_FinalizePublication
        - Agent_MoveSlashPoolToRewardPool
        - Agent_PickReviewers
        - Agent_RecordReview
        - Agent_RequestVRF
        - Agent_TransferSlashPoolToTreasury
        - Claim
        - CoordinatorSet
        - IsAvailableReviewer
        - LockedStakeOnPubId
        - MemberAvailableStake
        - MemberLockedStake
        - MemberLockedStakeOnPubId
        - MemberReputation
        - NewPublicationStatus
        - OwnershipTransferRequested
        - OwnershipTransferred
        - RewardMember
        - RewardPool
        - SlashMember
        - SlashPool
        - SubmitPublication
      abis:
        - name: BioVerifyV3
          file: ./abis/BioVerifyV3.json
      eventHandlers:
        - event: Agent_FinalizePublication(indexed uint256,string,uint8)
          handler: handleAgent_FinalizePublication
        - event: Agent_MoveSlashPoolToRewardPool(indexed uint256)
          handler: handleAgent_MoveSlashPoolToRewardPool
        - event: Agent_PickReviewers(indexed uint256,indexed address,address[],address,string)
          handler: handleAgent_PickReviewers
        - event: Agent_RecordReview(indexed address,indexed uint256)
          handler: handleAgent_RecordReview
        - event: Agent_RequestVRF(indexed uint256,uint256)
          handler: handleAgent_RequestVRF
        - event: Agent_TransferSlashPoolToTreasury(indexed address,indexed uint256)
          handler: handleAgent_TransferSlashPoolToTreasury
        - event: Claim(indexed address,uint256,uint256,uint256)
          handler: handleClaim
        - event: CoordinatorSet(address)
          handler: handleCoordinatorSet
        - event: IsAvailableReviewer(indexed address,bool,uint256)
          handler: handleIsAvailableReviewer
        - event: LockedStakeOnPubId(indexed uint256,uint256)
          handler: handleLockedStakeOnPubId
        - event: MemberAvailableStake(indexed address,uint256)
          handler: handleMemberAvailableStake
        - event: MemberLockedStake(indexed address,uint256)
          handler: handleMemberLockedStake
        - event: MemberLockedStakeOnPubId(indexed address,indexed uint256,uint256)
          handler: handleMemberLockedStakeOnPubId
        - event: MemberReputation(indexed address,uint256)
          handler: handleMemberReputation
        - event: NewPublicationStatus(indexed uint256,uint8)
          handler: handleNewPublicationStatus
        - event: OwnershipTransferRequested(indexed address,indexed address)
          handler: handleOwnershipTransferRequested
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: RewardMember(indexed address)
          handler: handleRewardMember
        - event: RewardPool(uint256)
          handler: handleRewardPool
        - event: SlashMember(indexed address)
          handler: handleSlashMember
        - event: SlashPool(uint256)
          handler: handleSlashPool
        - event: SubmitPublication(indexed address,indexed uint256,string)
          handler: handleSubmitPublication
      file: ./src/bio-verify-v-3.ts
