[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
sepolia = "${ALCHEMY_SEPOLIA_RPC_URL}"
base_sepolia = "${ALCHEMY_BASE_SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
base_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api", chain = 84532 }

# source .env && forge script script/BioVerifyV3.s.sol:BioVerifyV3Script --rpc-url base_sepolia --broadcast --verify --target-contract BioVerifyV3
# source .env && forge script script/BioVerifyV3.s.sol:BioVerifyV3Script --rpc-url sepolia --broadcast --verify --target-contract BioVerifyV3