specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: BioVerify
    network: sepolia
    source:
      address: "0x0C81E8aAc54deDf98920D3f8e04f6e9d0De39e6E"
      abi: BioVerify
      startBlock: 10313499
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - BioVerify_Agent_PickReviewers
        - BioVerify_Agent_PublishPublication
        - BioVerify_Agent_RequestVRF
        - BioVerify_Agent_ReviewRecorded
        - BioVerify_Agent_RewardReviewer
        - BioVerify_Agent_SetMemberReputation
        - BioVerify_Agent_SlashMember
        - BioVerify_Agent_SlashPublication
        - BioVerify_Agent_SlashPublisher
        - BioVerify_Agent_TransferSlashedPool
        - BioVerify_Claimed
        - BioVerify_PayReviewerMinStake
        - BioVerify_SubmitPublication
        - CoordinatorSet
        - OwnershipTransferRequested
        - OwnershipTransferred
      abis:
        - name: BioVerify
          file: ./abis/BioVerify.json
      eventHandlers:
        - event: BioVerify_Agent_PickReviewers(indexed uint256,address[],indexed address,string)
          handler: handleBioVerify_Agent_PickReviewers
        - event: BioVerify_Agent_PublishPublication(indexed uint256,string)
          handler: handleBioVerify_Agent_PublishPublication
        - event: BioVerify_Agent_RequestVRF(indexed uint256,indexed uint256)
          handler: handleBioVerify_Agent_RequestVRF
        - event: BioVerify_Agent_ReviewRecorded(indexed address,indexed uint256)
          handler: handleBioVerify_Agent_ReviewRecorded
        - event: BioVerify_Agent_RewardReviewer(indexed address,indexed uint256,indexed uint256)
          handler: handleBioVerify_Agent_RewardReviewer
        - event: BioVerify_Agent_SetMemberReputation(indexed address,indexed uint256)
          handler: handleBioVerify_Agent_SetMemberReputation
        - event: BioVerify_Agent_SlashMember(indexed address,indexed uint256,indexed uint256)
          handler: handleBioVerify_Agent_SlashMember
        - event: BioVerify_Agent_SlashPublication(indexed uint256,string)
          handler: handleBioVerify_Agent_SlashPublication
        - event: BioVerify_Agent_SlashPublisher(indexed uint256,indexed address,string)
          handler: handleBioVerify_Agent_SlashPublisher
        - event: BioVerify_Agent_TransferSlashedPool(indexed address,indexed uint256)
          handler: handleBioVerify_Agent_TransferSlashedPool
        - event: BioVerify_Claimed(indexed address,indexed uint256,indexed uint256)
          handler: handleBioVerify_Claimed
        - event: BioVerify_PayReviewerMinStake(indexed address)
          handler: handleBioVerify_PayReviewerMinStake
        - event: BioVerify_SubmitPublication(indexed address,indexed uint256,string)
          handler: handleBioVerify_SubmitPublication
        - event: CoordinatorSet(address)
          handler: handleCoordinatorSet
        - event: OwnershipTransferRequested(indexed address,indexed address)
          handler: handleOwnershipTransferRequested
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
      file: ./src/bio-verify.ts
